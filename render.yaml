services:
  - type: web
    name: dall-ai-agent
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port 8080
    envVars:
      - key: GROQ_API_KEY
        sync: false  # أضف القيمة يدوياً من لوحة تحكم Render
      - key: PYTHON_VERSION
        value: "3.11.9"
